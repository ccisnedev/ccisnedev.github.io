<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg
   viewBox="0 0 64 64"
   width="64"
   height="64"
   version="1.1"
   id="svg4"
   sodipodi:docname="favicon.svg"
   inkscape:version="1.3 (0e150ed6c4, 2023-07-21)"
   xmlns:inkscape="http://www.inkscape.org/namespaces/inkscape"
   xmlns:sodipodi="http://sodipodi.sourceforge.net/DTD/sodipodi-0.dtd"
   xmlns="http://www.w3.org/2000/svg"
   xmlns:svg="http://www.w3.org/2000/svg">
  <sodipodi:namedview
     id="namedview4"
     pagecolor="#ffffff"
     bordercolor="#000000"
     borderopacity="0.25"
     inkscape:showpageshadow="2"
     inkscape:pageopacity="0.0"
     inkscape:pagecheckerboard="0"
     inkscape:deskcolor="#d1d1d1"
     inkscape:zoom="12.984375"
     inkscape:cx="31.961492"
     inkscape:cy="31.922984"
     inkscape:window-width="1920"
     inkscape:window-height="1009"
     inkscape:window-x="-8"
     inkscape:window-y="-8"
     inkscape:window-maximized="1"
     inkscape:current-layer="svg4" />
  <!-- Background: the void (ma 間) -->
  <rect
     width="64"
     height="64"
     fill="#0a0a0a"
     rx="8"
     id="rect1" />
  <!-- Shiratori Ensō
       A single brushstroke: ensō (clockwise from bottom-left) whose
       trailing end lifts into a swan's neck curving upward.
       Stroke tapers via a mask to simulate brush lift.
  -->
  <defs
     id="defs3">
    <linearGradient
       id="taper"
       x1="0%"
       y1="0%"
       x2="100%"
       y2="0%">
      <stop
         offset="0%"
         stop-color="white"
         stop-opacity="1"
         id="stop1" />
      <stop
         offset="85%"
         stop-color="white"
         stop-opacity="1"
         id="stop2" />
      <stop
         offset="100%"
         stop-color="white"
         stop-opacity="0.4"
         id="stop3" />
    </linearGradient>
    <mask
       id="brush-taper">
      <rect
         width="64"
         height="64"
         fill="url(#taper)"
         id="rect3" />
    </mask>
  </defs>
  <!-- Main ensō arc: thick, sweeps from 7 o'clock clockwise to 10 o'clock -->
  <path
     d="M 20 44        C 12 36, 12 22, 24 16        C 34 11, 48 16, 50 28        C 52 40, 44 50, 32 50        C 24 50, 20 46, 20 44"
     fill="none"
     stroke="#f0f0f0"
     stroke-width="5"
     stroke-linecap="round"
     id="path3" />
  <!-- Swan neck: emerges from the ensō gap, curves up and left -->
  <!-- Swan head -->
</svg>
